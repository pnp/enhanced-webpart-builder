name: Generate templates.json

on:
  push:
    paths:
      - 'templates/**/assets/manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate .metadata/templates.json
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const repoRoot = process.cwd();
          const templatesRoot = path.join(repoRoot, 'templates');
          const outputDir = path.join(repoRoot, '.metadata');
          const outputFile = path.join(outputDir, 'templates.json');

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            let results = [];
            for (const e of entries) {
              const full = path.join(dir, e.name);
              if (e.isDirectory()) results = results.concat(walk(full));
              else results.push(full);
            }
            return results;
          }

          let manifests = [];
          if (fs.existsSync(templatesRoot)) {
            const files = walk(templatesRoot);
            for (const f of files) {
              if (!f.endsWith(path.join('assets', 'manifest.json'))) continue;
              const raw = fs.readFileSync(f, 'utf8');
              try {
                const json = JSON.parse(raw);
                manifests.push(json);
              } catch (err) {
                console.error('Invalid JSON in', path.relative(repoRoot, f));
                throw err;
              }
            }
          }

          manifests.sort((a, b) => (a.id || '').localeCompare(b.id || ''));

          const out = {
            updated: new Date().toISOString().slice(0, 10),
            templates: manifests,
          };

          fs.mkdirSync(outputDir, { recursive: true });
          fs.writeFileSync(outputFile, JSON.stringify(out, null, 4) + '\n');

          console.log('Wrote', path.relative(repoRoot, outputFile), 'with', manifests.length, 'templates');
          NODE

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .metadata/templates.json
          git commit -m "chore: update .metadata/templates.json"
          git push